name: Release and Publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: 'Publish package to npm after creating GitHub release'
        required: false
        default: true
        type: boolean
      release_reason:
        description: 'Optional note for manual release runs'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  determine-release:
    name: Determine release eligibility
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version_check.outputs.should_release }}
      version: ${{ steps.version_check.outputs.version }}
      reason: ${{ steps.version_check.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if package version changed
        id: version_check
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const packageJsonPath = path.join(process.env.GITHUB_WORKSPACE, 'package.json');
            const currentPackage = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
            const currentVersion = currentPackage.version;

            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_release', 'true');
              core.setOutput('version', currentVersion);
              core.setOutput('reason', 'manual-dispatch');
              return;
            }

            const beforeSha = context.payload.before;
            let previousVersion = null;

            if (beforeSha && !/^0+$/.test(beforeSha)) {
              try {
                const response = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: 'package.json',
                  ref: beforeSha,
                });

                const previousPackage = JSON.parse(
                  Buffer.from(response.data.content, 'base64').toString('utf8'),
                );
                previousVersion = previousPackage.version;
              } catch (error) {
                core.warning(`Could not read package.json at ${beforeSha}: ${error.message}`);
              }
            }

            const shouldRelease = previousVersion !== currentVersion;

            core.setOutput('should_release', shouldRelease ? 'true' : 'false');
            core.setOutput('version', currentVersion);
            core.setOutput('reason', shouldRelease ? 'version-change' : 'no-version-change');

            if (!shouldRelease) {
              core.notice(
                `Skipping release: package.json version unchanged (${currentVersion}).`,
              );
            }

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    needs: determine-release
    if: ${{ needs.determine-release.outputs.should_release == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests (if present)
        run: npm test --if-present

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - determine-release
      - build-and-test
    if: ${{ needs.determine-release.outputs.should_release == 'true' }}
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create release from package version
        id: release
        uses: actions/github-script@v8
        env:
          PACKAGE_VERSION: ${{ needs.determine-release.outputs.version }}
        with:
          script: |
            const version = process.env.PACKAGE_VERSION;
            const tagName = `v${version}`;

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });

              core.notice(`Release ${tagName} already exists. Skipping creation.`);
              core.setOutput('tag_name', tagName);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: tagName,
              target_commitish: context.sha,
              generate_release_notes: true,
              draft: false,
              prerelease: false,
            });

            core.setOutput('tag_name', tagName);
            core.info(`Created release ${tagName}`);

  publish-to-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    needs:
      - determine-release
      - build-and-test
      - create-github-release
    if: ${{ needs.determine-release.outputs.should_release == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish_to_npm != 'false') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24 for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
