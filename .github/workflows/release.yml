name: Release and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: 'Publish package to npm after creating GitHub release'
        required: false
        default: true
        type: boolean
      release_reason:
        description: 'Optional note for manual release runs'
        required: false
        type: string

permissions:
  contents: write

jobs:
  determine-release:
    name: Determine release eligibility
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version_check.outputs.should_release }}
      version: ${{ steps.version_check.outputs.version }}
      reason: ${{ steps.version_check.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if package version changed
        id: version_check
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const packageJsonPath = path.join(process.env.GITHUB_WORKSPACE, 'package.json');
            const currentPackage = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
            const currentVersion = currentPackage.version;
            core.setOutput('should_release', 'true');
            core.setOutput('version', currentVersion);
            core.setOutput('reason', context.eventName === 'workflow_dispatch' ? 'manual-dispatch' : 'always-release');
            core.info(`Always releasing version ${currentVersion}`);

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    needs: determine-release
    if: needs.determine-release.outputs.should_release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests (if present)
        run: npm test --if-present

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - determine-release
      - build-and-test
    if: needs.determine-release.outputs.should_release == 'true' && needs.build-and-test.result == 'success'
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create release from package version
        id: release
        uses: actions/github-script@v8
        env:
          PACKAGE_VERSION: ${{ needs.determine-release.outputs.version }}
        with:
          script: |
            const version = process.env.PACKAGE_VERSION;
            const tagName = `v${version}`;

            // Try to delete existing release for this tag
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });

              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
              });
              core.info(`Deleted existing release for ${tagName}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            // Try to delete existing tag ref
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });
              core.info(`Deleted existing tag ${tagName}`);
            } catch (error) {
              if (error.status !== 422 && error.status !== 404) {
                throw error;
              }
            }

            // Create fresh release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: tagName,
              target_commitish: context.sha,
              generate_release_notes: true,
              draft: false,
              prerelease: false,
            });

            core.setOutput('tag_name', tagName);
            core.info(`Created release ${tagName} (id: ${release.data.id})`);

  publish-to-npm:
    name: Publish package to npm
    runs-on: ubuntu-latest
    needs:
      - determine-release
      - build-and-test
      - create-github-release
    if: >-
      needs.determine-release.outputs.should_release == 'true' &&
      needs.build-and-test.result == 'success' &&
      needs.create-github-release.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 24 for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check if version is already published
        id: npm_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version 2>/dev/null | grep -q "^${VERSION}$"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already published to npm, skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm_check.outputs.already_published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  debug-release-gate:
    name: Debug release gating
    runs-on: ubuntu-latest
    needs:
      - determine-release
    if: always()
    steps:
      - name: Print determine-release outputs
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "should_release=${{ needs.determine-release.outputs.should_release }}"
          echo "version=${{ needs.determine-release.outputs.version }}"
          echo "reason=${{ needs.determine-release.outputs.reason }}"
          echo "publish_to_npm(input)=${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_npm || 'n/a' }}"
